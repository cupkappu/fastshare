# P2P Testing Setup - Single shared server
# Both browser tabs connect to this single server for signaling
#
# Usage:
#   1. Build: docker build -t fastshare:test .
#   2. Run: docker compose -f docker-compose.test-p2p.yml up -d
#   3. Open TWO browser tabs to http://localhost:8459
#   4. Switch BOTH to P2P mode - they should discover each other

services:
  fastshare-server:
    image: fastshare:test
    container_name: fastshare-server
    ports:
      - "8459:8459"
    environment:
      - PORT=8459
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8459/"]
      interval: 10s
      timeout: 5s
      retries: 3
